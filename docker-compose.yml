services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: notification
      MYSQL_USER: app
      MYSQL_PASSWORD: app-password
      MYSQL_ROOT_PASSWORD: root-password
    command:
      - --default-time-zone=+00:00
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uapp", "-papp-password" ]
      interval: 5s
      timeout: 3s
      retries: 12

  app:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/notification?connectionTimeZone=UTC
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: app-password
    ports:
      - "8080:8080"
