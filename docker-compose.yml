services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: notification
      MYSQL_USER: app
      MYSQL_PASSWORD: app-password
      MYSQL_ROOT_PASSWORD: root-password
    command:
      - --default-time-zone=+00:00
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    ports:
      - "3306:3306"
    healthcheck:
      # 반드시 127.0.0.1(TCP)로 검사한다. localhost는 유닉스 소켓으로 붙는데,
      # MySQL 최초 기동 시 초기화용 임시 서버(--skip-networking)가 소켓 ping에
      # 응답해 진짜 서버가 뜨기 전에 healthy로 오판된다.
      test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uapp", "-papp-password" ]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 30s

  app:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/notification?connectionTimeZone=UTC
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: app-password
    ports:
      - "8080:8080"
