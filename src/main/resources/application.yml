spring:
  application:
    name: notification

  datasource:
    url: jdbc:mysql://localhost:3306/notification?connectionTimeZone=UTC
    username: app
    password: app-password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  # 스키마는 Flyway가 관리한다. 과제는 fresh DB를 기준으로 하며, Flyway 이력이 없는
  # 기존 개발 볼륨은 docker compose down -v 후 다시 생성해야 한다.
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health

notification:
  polling-interval: 1s
  batch-size: 50
  stuck-threshold: 5m
  stuck-recovery-interval: 30s
