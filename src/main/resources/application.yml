spring:
  application:
    name: notification

  datasource:
    url: jdbc:mysql://localhost:3306/notification?connectionTimeZone=UTC
    username: app
    password: app-password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  # 스키마는 Flyway 마이그레이션(db/migration/V*.sql)이 관리한다. 기존 DB에도 버전
  # 추적으로 변경이 안전하게 반영되며, ddl-auto=validate로 매핑 일치를 검증한다.
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health

notification:
  polling-interval: 1s
  batch-size: 50
  stuck-threshold: 5m
  stuck-recovery-interval: 30s
